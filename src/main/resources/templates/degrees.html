<!doctype html>
<html lang="en">
  <head>
    <th:block th:replace="fragments :: risorse-head"></th:block>
    <title>Degrees</title>
  </head>
  <body>
  <nav th:replace="fragments :: navbar('degrees')"></nav>
    <div class="container" th:if="${listaDegrees.size()>0}">
      <table>
        <thead>
          <tr>
            <th>id</th>
            <th>departmentId</th>
            <th>name</th>
            <th>level</th>
            <th>address</th>
            <th>email</th>
            <th>website</th>
          </tr>
        </thead>
          <tbody>
            <tr th:each="dg : ${listaDegrees}">
              <td th:text="${dg.id}"></td>
              <td th:text="${dg.departmentId}"></td>
              <td th:text="${dg.name}"></td>
              <td th:text="${dg.level}"></td>
              <td th:text="${dg.address}"></td>
              <td th:text="${dg.email}"></td>
              <td th:text="${dg.website}"></td>
            </tr>
          </tbody>
      </table>
    </div>
   <div th:unless="${listaDegrees.size()>0}" class="alert alert-info">Non ci sono degrees da visualizzare</div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p" crossorigin="anonymous"></script>
  </body>
</html>
