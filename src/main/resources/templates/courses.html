<!doctype html>
<html lang="it">
  <head>
    <th:block th:replace="fragments :: risorse-head"></th:block>
    <title>Courses</title>
  </head>
  <body>
  <nav th:replace="fragments :: navbar('courses')"></nav>
  <h1 class="text-center">Courses List</h1>
  <hr>
    <div class="container" th:if="${coursesList.size()>0}">
      <table class="table">
        <thead>
          <tr>
            <th>id</th>
            <th>degreeId</th>
            <th>name</th>
            <th>description</th>
            <th>period</th>
            <th>year</th>
            <th>cfu</th>
            <th>website</th>
          </tr>
        </thead>
          <tbody>
            <tr th:each="c : ${coursesList}">
              <td>
              <a th:href="@{|courses/${c.id}|}" th:text="${c.id}"></a>
              </td>
              <td th:text="${c.degreeId}"></td>
              <td th:text="${c.name}"></td>
              <td th:text="${c.description}"></td>
              <td th:text="${c.period}"></td>
              <td th:text="${c.year}"></td>
              <td th:text="${c.cfu}"></td>
              <td th:text="${c.website}"></td>
            </tr>
          </tbody>
      </table>
    </div>
   <div th:unless="${listaTeachers.size()>0}" class="alert alert-info">Non ci sono insegnanti da visualizzare</div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p" crossorigin="anonymous"></script>
  </body>
</html>
