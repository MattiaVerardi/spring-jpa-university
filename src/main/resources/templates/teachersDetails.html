<!DOCTYPE html>
<html lang="it">
<html xmlns:th="http://www.thymeleaf.org">
<head>
     <th:block th:replace="fragments :: risorse-head"></th:block>
    <title>Teachers Details</title>
</head>
<body>
 <nav th:replace="fragments :: navbar('teachers details')"></nav>
    <div class = "container">
        <h1>Dettaglio Insegnanti</h1>
        <hr>
        <table class="table">
            <thead>
                <tr>
                    <th>id</th>
                    <th>name</th>
                    <th>surname</th>
                    <th>phone</th>
                    <th>email</th>
                    <th>office_address</th>
                    <th>office_number</th>
                </tr>
            <tbody>
                <tr th:each="t : ${teachersList}">
                    <td>
                      <a th:href="@{|teachers/${d.id}|}" th:text="${t.id}"></a>
                    </td>
                    <td th:text="${t.name}"></td>
                    <td th:text="${t.surname}"></td>
                    <td th:text="${t.phone}"></td>
                    <td th:text="${t.email}"></td>
                    <td th:text="${t.officeAddress}"></td>
                    <td th:text="${t.officeNumber}"></td>
                </tr>
            </tbody>
            </thead>
        </table>

    </div>
      <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p" crossorigin="anonymous"></script>  
</body>
</html>
