<!doctype html>
<html lang="it">
  <head>
    <th:block th:replace="fragments :: risorse-head"></th:block>
    <title>Teachers</title>
  </head>
  <body>
  <nav th:replace="fragments :: navbar('teachers')"></nav>
  <h1 class="text-center">Teachers List</h1>
  <hr>
    <div class="container" th:if="${listaTeachers.size()>0}">
      <table class="table">
        <thead>
          <tr>
            <th>id</th>
            <th>name</th>
            <th>surname</th>
            <th>phone</th>
            <th>email</th>
            <th>officeAddress</th>
            <th>officeNumber</th>
          </tr>
        </thead>
          <tbody>
            <tr th:each="t : ${listaTeachers}">
              <td>
              <a th:href="@{|teachers/${t.id}|}" th:text="${t.id}"></a>
              </td>
              <td th:text="${t.name}"></td>
              <td th:text="${t.surname}"></td>
              <td th:text="${t.phone}"></td>
              <td th:text="${t.email}"></td>
              <td th:text="${t.officeAddress}"></td>
              <td th:text="${t.officeNumber}"></td>
            </tr>
          </tbody>
      </table>
    </div>
   <div th:unless="${listaTeachers.size()>0}" class="alert alert-info">Non ci sono insegnanti da visualizzare</div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p" crossorigin="anonymous"></script>
  </body>
</html>
