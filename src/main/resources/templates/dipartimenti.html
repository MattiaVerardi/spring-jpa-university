<!DOCTYPE html>
<html lang="it">
<html xmlns:th="http://www.thymeleaf.org">
<head>
     <th:block th:replace="fragments :: risorse-head"></th:block>
    <title>Spring University</title>
</head>
<body>
    <div class = "container">
        <h1>Dipartimenti</h1>
        <hr>
        <table class="table">
            <thead>
                <tr>
                    <th>id</th>
                    <th>name</th>
                    <th>address</th>
                    <th>phone</th>
                    <th>email</th>
                    <th>website</th>
                    <th>headOfDepartment</th>
                </tr>
            <tbody>
                <tr th:each="d : ${listaDipartimenti}">
                    <td th:text="${d.id}"></td>
                    <td th:text="${d.name}"></td>
                    <td th:text="${d.address}"></td>
                    <td th:text="${d.phone}"></td>
                    <td th:text="${d.email}"></td>
                    <td th:text="${d.website}"></td>
                    <td th:text="${d.headOfDepartment}"></td>
                </tr>
            </tbody>
            </thead>
        </table>

    </div>
      <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p" crossorigin="anonymous"></script>  
</body>
</html>
